name: ci

# Typecheck + build on every push and PR. The build step also serves as
# our publish smoke — if `tsc` produces a runnable `dist/index.js` then
# the npm tarball will too.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke — bin runs
        run: node dist/index.js --version
